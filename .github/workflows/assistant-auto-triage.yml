name: '🏷️ Assistant Auto Triage'

on:
  issues:
    types:
      - 'assigned'

jobs:
  triage:
    if: |-
      ${{ github.event.sender.type == 'User' }}
    uses: './.github/workflows/gemini-triage.yml'
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    with:
      additional_context: 'Issue was assigned; run triage and apply labels if needed.'
    secrets: 'inherit'
