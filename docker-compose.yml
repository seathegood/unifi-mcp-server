services:
  # UniFi MCP Server
  unifi-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unifi-mcp-server
    restart: unless-stopped
    stdin_open: true  # -i flag for STDIO transport
    tty: false
    environment:
      # UniFi API Configuration
      UNIFI_API_KEY: ${UNIFI_API_KEY:?UNIFI_API_KEY required}
      UNIFI_API_TYPE: ${UNIFI_API_TYPE:-cloud-v1}
      UNIFI_CLOUD_API_URL: ${UNIFI_CLOUD_API_URL:-https://api.ui.com}
      UNIFI_LOCAL_HOST: ${UNIFI_LOCAL_HOST:-}
      UNIFI_LOCAL_PORT: ${UNIFI_LOCAL_PORT:-443}
      UNIFI_LOCAL_VERIFY_SSL: ${UNIFI_LOCAL_VERIFY_SSL:-true}
      UNIFI_DEFAULT_SITE: ${UNIFI_DEFAULT_SITE:-default}
      UNIFI_SITE_MANAGER_ENABLED: ${UNIFI_SITE_MANAGER_ENABLED:-false}

      # MCP Server Configuration
      MCP_SERVER_PORT: ${MCP_SERVER_PORT:-3000}
      MCP_LOG_LEVEL: ${MCP_LOG_LEVEL:-INFO}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_API_REQUESTS: ${LOG_API_REQUESTS:-true}
      UNIFI_AUDIT_LOG_ENABLED: ${UNIFI_AUDIT_LOG_ENABLED:-true}

      # Optional: Rate Limiting
      UNIFI_RATE_LIMIT_REQUESTS: ${UNIFI_RATE_LIMIT_REQUESTS:-100}
      UNIFI_RATE_LIMIT_PERIOD: ${UNIFI_RATE_LIMIT_PERIOD:-60}
      UNIFI_MAX_RETRIES: ${UNIFI_MAX_RETRIES:-3}
      UNIFI_RETRY_BACKOFF_FACTOR: ${UNIFI_RETRY_BACKOFF_FACTOR:-2.0}
      UNIFI_REQUEST_TIMEOUT: ${UNIFI_REQUEST_TIMEOUT:-30}
      UNIFI_CACHE_ENABLED: ${UNIFI_CACHE_ENABLED:-true}
      UNIFI_CACHE_TTL: ${UNIFI_CACHE_TTL:-300}

      # Optional: Agnost Performance Tracking
      AGNOST_ENABLED: ${AGNOST_ENABLED:-false}
      AGNOST_ORG_ID: ${AGNOST_ORG_ID:-}
      AGNOST_ENDPOINT: ${AGNOST_ENDPOINT:-https://api.agnost.ai}
      AGNOST_DISABLE_INPUT: ${AGNOST_DISABLE_INPUT:-false}
      AGNOST_DISABLE_OUTPUT: ${AGNOST_DISABLE_OUTPUT:-false}

      # Optional: Redis Caching
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Optional: Webhook Support
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    networks:
      - mcp-network
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./audit.log:/app/audit.log
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:3000/health', timeout=3); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MCP Toolbox - Analytics and Monitoring Dashboard
  mcp-toolbox:
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:${TOOLBOX_VERSION:-0.26.0}
    container_name: mcp-toolbox
    restart: unless-stopped
    ports:
      - "${TOOLBOX_PORT:-8080}:${TOOLBOX_PORT:-8080}"
    environment:
      TOOLBOX_SERVICE_NAME: ${TOOLBOX_SERVICE_NAME:-unifi-mcp-toolbox}
    command:
      - toolbox
      - --tools-file
      - /app/tools.yaml
      - --address
      - 0.0.0.0
      - --port
      - "${TOOLBOX_PORT:-8080}"
      - --ui
    volumes:
      - ./tools.yaml:/app/tools.yaml:ro
    networks:
      - mcp-network


  # Redis Cache (Optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: unifi-mcp-redis
    restart: unless-stopped
    command: >
      sh -c '
        ARGS="--appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru";
        if [ -n "$$REDIS_PASSWORD" ]; then
          ARGS="$$ARGS --requirepass $$REDIS_PASSWORD";
        fi;
        exec redis-server $$ARGS
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD-SHELL", 'sh -c "redis-cli ${REDIS_PASSWORD:+-a \"$$REDIS_PASSWORD\"} ping | grep -q PONG"']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  mcp-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
